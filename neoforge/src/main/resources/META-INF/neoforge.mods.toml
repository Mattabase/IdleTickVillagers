modLoader="javafml"
loaderVersion="${neoforge_loader_version_range}"
license="${license}"

[[mods]]
    modId="${mod_id}"
    version="${version}"
    displayName="${mod_name}"
    authors="${mod_author}"
    displayTest="IGNORE_SERVER_VERSION"
    description="""${description}"""

[[dependencies.idletickvillagers]]
    modId="neoforge"
    type="required"
    versionRange="${neoforge_loader_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.idletickvillagers]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"


[[dependencies.idletickvillagers]]
    modId="polylib"
    type="required"
    versionRange="[2.0.6,)"
    ordering="NONE"
    side="BOTH"

[[mixins]]
config = "idletickvillagers.mixins.json"
